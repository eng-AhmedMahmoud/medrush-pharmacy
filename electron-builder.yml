appId: dev.medrush.pharmacy
productName: MedRush Pharmacy
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
# Windows packaging (see README "Packaging for Windows").
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: MedRush Pharmacy
# macOS / Linux targets are optional; kept minimal for local test builds.
mac:
  target:
    - dmg
  category: public.app-category.medical
linux:
  target:
    - AppImage
